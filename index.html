        function parseTime(timeStr) {
            if (!timeStr || timeStr === "文革") {
                return null;
            }
            
            const parts = timeStr.split("～");
            if (parts.length !== 2) {
                return null;
            }
            
            const parseDate = (dateStr) => {
                if (!dateStr || dateStr.trim() === "") {
                    return null;
                }
                
                const match = dateStr.trim().match(/(\d{4})\.?(\d{1,2})?/);
                if (!match) {
                    return null;
                }
                
                const year = parseInt(match[1]);
                const month = match[2] ? parseInt(match[2]) : 1;
                
                return { year, month };
            };
            
            const startDate = parseDate(parts[0]);
            const endDate = parseDate(parts[1]);
            
            if (!startDate || !endDate) {
                return null;
            }
            
            return { startDate, endDate };
        }
        
        function calculateDuration(timeData) {
            if (!timeData) {
                return null;
            }
            
            const { startDate, endDate } = timeData;
            
            let years = endDate.year - startDate.year;
            let months = endDate.month - startDate.month;
            
            if (months < 0) {
                years--;
                months += 12;
            }
            
            const totalMonths = years * 12 + months;
            
            return {
                years,
                months,
                totalMonths,
                formatted: years > 0 ? `${years}年${months > 0 ? months + '个月' : ''}` : `${months}个月`
            };
        }
        
        function getSurname(name) {
            if (!name) return "未知";
            const trimmedName = name.trim();
            return trimmedName.charAt(0);
        }
        
        function processData(data) {
            const processed = data.map(item => {
                const timeData = parseTime(item.time);
                const duration = calculateDuration(timeData);
                const surname = getSurname(item.name);
                
                return {
                    ...item,
                    surname,
                    duration
                };
            });
            
            const surnameStats = {};
            let totalYears = 0;
            
            processed.forEach(item => {
                if (item.duration) {
                    if (!surnameStats[item.surname]) {
                        surnameStats[item.surname] = {
                            count: 0,
                            totalMonths: 0,
                            names: []
                        };
                    }
                    surnameStats[item.surname].count++;
                    surnameStats[item.surname].totalMonths += item.duration.totalMonths;
                    surnameStats[item.surname].names.push(item.name);
                    totalYears += item.duration.totalMonths / 12;
                }
            });
            
            return {
                processed,
                surnameStats,
                totalYears
            };
        }
        
        function createChart(surnameStats) {
            const ctx = document.getElementById('surnameChart').getContext('2d');
            
            const labels = Object.keys(surnameStats).sort();
            const data = labels.map(surname => (surnameStats[surname].totalMonths / 12).toFixed(2));
            
            const colors = [
                '#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF',
                '#FF9F40', '#FF6384', '#C9CBCF', '#7BC225', '#E74C3C',
                '#3498B9', '#9B59B6', '#1ABC9C', '#F39C12', '#D35400',
                '#2ECC71', '#E67E22', '#34495E', '#16A085', '#27AE60'
            ];
            
            if (chart) {
                chart.destroy();
            }
            
            chart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: labels.map(surname => `${surname}姓`),
                    datasets: [{
                        label: '任职年数',
                        data: data,
                        backgroundColor: colors.slice(0, labels.length),
                        borderColor: '#fff',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: {
                                font: {
                                    size: 14
                                },
                                padding: 15,
                                generateLabels: function(chart) {
                                    const data = chart.data;
                                    return data.labels.map((label, i) => {
                                        const surname = label.replace('姓', '');
                                        const value = parseFloat(data.datasets[0].data[i]);
                                        const count = surnameStats[surname].count;
                                        return {
                                            text: `${label}: ${value}年 (${count}人)`,
                                            fillStyle: data.datasets[0].backgroundColor[i],
                                            hidden: false,
                                            index: i
                                        };
                                    });
                                }
                            }
                        },
                        title: {
                            display: true,
                            text: '各姓氏负责人任职时间分布',
                            font: {
                                size: 18,
                                weight: 'bold'
                            },
                            padding: 20
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const surname = context.label.replace('姓', '');
                                    const value = parseFloat(context.raw);
                                    const count = surnameStats[surname].count;
                                    const names = surnameStats[surname].names.join('、');
                                    return [
                                        `任职年数: ${value}年`,
                                        `人数: ${count}人`,
                                        `姓名: ${names}`
                                    ];
                                }
                            }
                        }
                    }
                }
            });
        }
        
        function populateTable(processed) {
            const tbody = document.getElementById('dataTableBody');

            processed.forEach(item => {

                row.innerHTML = `

                    <td>${item.duration ? item.duration.formatted : '无法计算'}</td>
                `;
                tbody.appendChild(row);
            });
        }

            document.getElementById('totalPeople').textContent = processed.length;

        function updateLastUpdateTime() {
            const now = new Date();
            const formatted = now.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('lastUpdate').textContent = formatted;
            
            localStorage.setItem('lastUpdate', now.toISOString());
        }
        
        function calculateNextUpdate() {
            const now = new Date();
            const nextMonth = new Date(now.getFullYear(), now.getMonth() + 1, 1);
            
            const formatted = nextMonth.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
            
            document.getElementById('nextUpdate').textContent = formatted;
        }
        
        function checkAutoUpdate() {
            const lastUpdateStr = localStorage.getItem('lastUpdate');
            
            if (!lastUpdateStr) {
                updateLastUpdateTime();
                return true;
            }
            
            const lastUpdate = new Date(lastUpdateStr);
            const now = new Date();
            
            const isSameMonth = lastUpdate.getMonth() === now.getMonth() && 
                               lastUpdate.getFullYear() === now.getFullYear();
            
            const isFirstDay = now.getDate() === 1;
            
            if (isFirstDay && !isSameMonth) {
                updateLastUpdateTime();
                return true;
            }
            
            document.getElementById('lastUpdate').textContent = lastUpdate.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            
            return false;
        }
        
        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('error').textContent = message;

        }

            document.getElementById('error').style.display = 'none';

            try {
                const shouldUpdate = checkAutoUpdate();
                
                const { processed, surnameStats, totalYears } = processData(rawData);
                
                createChart(surnameStats);
                populateTable(processed);
                updateStats(processed, totalYears, surnameStats);
                calculateNextUpdate();
                
                if (shouldUpdate) {
                    updateLastUpdateTime();
                }
                
                showContent();
                
                console.log('数据加载完成，自动更新检查：', shouldUpdate ? '已更新' : '无需更新');
                
            } catch (error) {
                console.error('初始化错误:', error);
                showError('加载数据时发生错误：' + error.message);
            }
        }
        
        window.addEventListener('load', init);
        
        setInterval(() => {
            const now = new Date();
            if (now.getDate() === 1 && now.getHours() === 0 && now.getMinutes() === 0) {
                console.log('执行每月自动更新...');
                init();
            }
        }, 60000);
    </script>
</body>
</html>
